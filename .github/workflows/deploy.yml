name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test
      - run: swift run SiteGenerator validate

  build-and-deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: swift run SiteGenerator generate
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated README [skip ci]"
          file_pattern: README.md
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output/
      - id: deployment
        uses: actions/deploy-pages@v4
